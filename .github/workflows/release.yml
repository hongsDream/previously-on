name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  compatibility-evidence:
    name: separately supplied live compatibility evidence
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: release-compatibility
    steps:
      - name: Check out tagged source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Install Node.js 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
      - name: Download pinned live compatibility evidence bundle
        env:
          BUNDLE_URL: ${{ vars.LIVE_COMPATIBILITY_BUNDLE_URL }}
          BUNDLE_SHA256: ${{ vars.LIVE_COMPATIBILITY_BUNDLE_SHA256 }}
        run: |
          test -n "$BUNDLE_URL"
          test "${BUNDLE_URL#https://}" != "$BUNDLE_URL"
          printf '%s' "$BUNDLE_SHA256" | grep -E '^[0-9a-fA-F]{64}$'
          curl --fail --location --proto '=https' --proto-redir '=https' --tlsv1.2 \
            --output "${RUNNER_TEMP}/live-compatibility.tar.gz" "$BUNDLE_URL"
          printf '%s  %s\n' "$BUNDLE_SHA256" "${RUNNER_TEMP}/live-compatibility.tar.gz" | sha256sum --check --strict
          mkdir -p "${RUNNER_TEMP}/live-compatibility"
          tar -tzf "${RUNNER_TEMP}/live-compatibility.tar.gz" > "${RUNNER_TEMP}/live-compatibility.entries"
          node -e '
            const fs = require("node:fs");
            const entries = fs.readFileSync(process.argv[1], "utf8").split(/\r?\n/).filter(Boolean);
            if (!entries.includes("live-compatibility.json")) throw new Error("bundle omitted live-compatibility.json");
            for (const entry of entries) {
              const normalized = entry.replaceAll("\\", "/");
              if (normalized.startsWith("/") || normalized.split("/").includes("..")) {
                throw new Error(`unsafe archive entry: ${entry}`);
              }
            }
          ' "${RUNNER_TEMP}/live-compatibility.entries"
          tar -tvzf "${RUNNER_TEMP}/live-compatibility.tar.gz" \
            | awk 'substr($1,1,1) !~ /^[-d]$/ { exit 1 }'
          tar -xzf "${RUNNER_TEMP}/live-compatibility.tar.gz" \
            -C "${RUNNER_TEMP}/live-compatibility" --no-same-owner --no-same-permissions
      - name: Validate live evidence against the tag and current Codex versions
        run: |
          VERSION="$(awk -F ' *= *' '/^version = / { gsub(/"/, "", $2); print $2; exit }' Cargo.toml)"
          node scripts/validate-live-compatibility.mjs \
            "${RUNNER_TEMP}/live-compatibility/live-compatibility.json" \
            --commit "$GITHUB_SHA" \
            --product-version "$VERSION" \
            --resolve-current-codex
      - name: Carry eligible evidence into this workflow only
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: eligible-live-compatibility-${{ github.sha }}
          path: ${{ runner.temp }}/live-compatibility/
          if-no-files-found: error
          overwrite: true
          retention-days: 30

  release-build:
    name: clean tagged release build
    needs: compatibility-evidence
    # Standard public macos-14 is arm64 per GitHub's hosted-runner contract.
    runs-on: macos-14
    timeout-minutes: 60
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Check out tagged source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Verify clean annotated version
        run: |
          VERSION="$(awk -F ' *= *' '/^version = / { gsub(/"/, "", $2); print $2; exit }' Cargo.toml)"
          test "$GITHUB_REF_NAME" = "v$VERSION"
          test "$(git cat-file -t "$GITHUB_REF_NAME")" = tag
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          test "$(git rev-parse "$GITHUB_REF_NAME^{commit}")" = "$GITHUB_SHA"
          test -z "$(git status --porcelain --untracked-files=normal)"
      - name: Install Rust 1.90
        run: rustup toolchain install 1.90.0 --profile minimal --component rustfmt,clippy && rustup default 1.90.0
      - name: Install Node.js 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - name: Download the eligible live compatibility evidence
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: eligible-live-compatibility-${{ github.sha }}
          path: ${{ runner.temp }}/live-compatibility
      - name: Revalidate evidence in the release job
        run: |
          VERSION="$(awk -F ' *= *' '/^version = / { gsub(/"/, "", $2); print $2; exit }' Cargo.toml)"
          node scripts/validate-live-compatibility.mjs \
            "${RUNNER_TEMP}/live-compatibility/live-compatibility.json" \
            --commit "$GITHUB_SHA" \
            --product-version "$VERSION"
      - name: Run release gate in clean checkout
        env:
          OUTPUT_DIR: ${{ runner.temp }}/release
        run: ./scripts/build-release.sh
      - name: Attest release artifacts
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: ${{ runner.temp }}/release/*
      - name: Create or refresh the draft GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PRERELEASE=false
          case "$VERSION" in
            *-*) PRERELEASE=true ;;
          esac
          EXPECTED="${RUNNER_TEMP}/expected-assets.txt"
          cat > "$EXPECTED" <<EOF
          NOTICE
          SHA256SUMS
          THIRD_PARTY_LICENSES.md
          previously-on-v$VERSION-macos-arm64.tar.gz
          previously-on-v$VERSION-source.tar.gz
          previously-on-v$VERSION.cdx.json
          previously-v$VERSION-macos-arm64
          EOF
          LC_ALL=C sort -o "$EXPECTED" "$EXPECTED"
          find "${RUNNER_TEMP}/release" -maxdepth 1 -type f -exec basename {} \; \
            | LC_ALL=C sort > "${RUNNER_TEMP}/local-assets.txt"
          cmp "$EXPECTED" "${RUNNER_TEMP}/local-assets.txt"

          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            test "$(gh release view "$GITHUB_REF_NAME" --json isDraft --jq .isDraft)" = true
            gh release upload "$GITHUB_REF_NAME" \
              "${RUNNER_TEMP}/release/"* --clobber
            gh release edit "$GITHUB_REF_NAME" \
              --prerelease="$PRERELEASE" --latest=false \
              --title "PreviouslyOn $GITHUB_REF_NAME" \
              --notes-file CHANGELOG.md
          else
            gh release create "$GITHUB_REF_NAME" \
              "${RUNNER_TEMP}/release/"* \
              --draft \
              --prerelease="$PRERELEASE" \
              --latest=false \
              --verify-tag \
              --title "PreviouslyOn $GITHUB_REF_NAME" \
              --notes-file CHANGELOG.md
          fi
          gh release view "$GITHUB_REF_NAME" --json assets --jq '.assets[].name' \
            | LC_ALL=C sort > "${RUNNER_TEMP}/remote-assets.txt"
          cmp "$EXPECTED" "${RUNNER_TEMP}/remote-assets.txt"
          test "$(gh release view "$GITHUB_REF_NAME" --json isDraft --jq .isDraft)" = true
          test "$(gh release view "$GITHUB_REF_NAME" --json isPrerelease --jq .isPrerelease)" = "$PRERELEASE"
      - name: Upload release bundle for audit
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: previously-on-${{ github.ref_name }}
          path: ${{ runner.temp }}/release/
          if-no-files-found: error
          overwrite: true
          retention-days: 30

  publish-crate:
    name: protected crates.io publish and exact-version smoke
    needs: release-build
    runs-on: macos-14
    timeout-minutes: 30
    environment:
      name: crates-io
      url: https://crates.io/crates/previously-on
    permissions:
      contents: write
      attestations: read
    steps:
      - name: Check out tagged source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Reverify the immutable release ref
        run: |
          test "$(git cat-file -t "$GITHUB_REF_NAME")" = tag
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          test "$(git rev-parse "$GITHUB_REF_NAME^{commit}")" = "$GITHUB_SHA"
      - name: Configure isolated Cargo target
        run: echo "CARGO_TARGET_DIR=$RUNNER_TEMP/publish-target" >> "$GITHUB_ENV"
      - name: Install Rust 1.90
        run: rustup toolchain install 1.90.0 --profile minimal && rustup default 1.90.0
      - name: Download the tested and attested release source
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: previously-on-${{ github.ref_name }}
          path: ${{ runner.temp }}/release
      - name: Verify and extract the publishable source
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SOURCE_ARCHIVE="${RUNNER_TEMP}/release/previously-on-v$VERSION-source.tar.gz"
          cd "${RUNNER_TEMP}/release"
          shasum -a 256 -c SHA256SUMS
          mkdir -p "${RUNNER_TEMP}/publish-source"
          tar -tzf "$SOURCE_ARCHIVE" | awk '
            /^\// { exit 1 }
            /(^|\/)\.\.($|\/)/ { exit 1 }
          '
          tar -tvzf "$SOURCE_ARCHIVE" \
            | awk 'substr($1,1,1) !~ /^[-d]$/ { exit 1 }'
          tar -xzf "$SOURCE_ARCHIVE" -C "${RUNNER_TEMP}/publish-source"
          SOURCE_DIR="${RUNNER_TEMP}/publish-source/previously-on-$VERSION"
          test -f "$SOURCE_DIR/Cargo.toml"
          test -f "$SOURCE_DIR/ui/dist/index.html"
          find "$SOURCE_DIR/ui/dist/assets" -type f -name '*.js' -print -quit | grep .
          find "$SOURCE_DIR/ui/dist/assets" -type f -name '*.css' -print -quit | grep .
          echo "SOURCE_MANIFEST=$SOURCE_DIR/Cargo.toml" >> "$GITHUB_ENV"
      - name: Repackage and verify the exact source to publish
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cargo package --manifest-path "$SOURCE_MANIFEST" --locked
          CRATE="$CARGO_TARGET_DIR/package/previously-on-$VERSION.crate"
          test -f "$CRATE"
          tar -tzf "$CRATE" | grep -E '/ui/dist/index\.html$'
          tar -tzf "$CRATE" | grep -E '/ui/dist/assets/.+\.js$'
          tar -tzf "$CRATE" | grep -E '/ui/dist/assets/.+\.css$'
      - name: Publish immutable crate after environment approval
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          CRATE="$CARGO_TARGET_DIR/package/previously-on-$VERSION.crate"
          INDEX_URL="https://index.crates.io/pr/ev/previously-on"
          INDEX_FILE="${RUNNER_TEMP}/previously-on.index"
          USER_AGENT="previously-on-release/$VERSION (+https://github.com/$GITHUB_REPOSITORY)"
          LOCAL_SHA="$(shasum -a 256 "$CRATE" | awk '{print $1}')"

          remote_checksum() {
            local max_time="${1:-30}"
            local retry_count="${2:-3}"
            local status
            status="$(curl --silent --show-error --compressed --location \
              --retry "$retry_count" --retry-all-errors --retry-delay 1 \
              --retry-max-time "$max_time" \
              --connect-timeout 10 --max-time "$max_time" \
              --proto '=https' --proto-redir '=https' \
              --user-agent "$USER_AGENT" \
              --output "$INDEX_FILE" --write-out '%{http_code}' \
              "$INDEX_URL")"
            case "$status" in
              200)
                jq -rs --arg version "$VERSION" '
                  map(select(.vers == $version)) |
                  if length == 0 then ""
                  elif length == 1 then .[0].cksum
                  else error("duplicate version entries in sparse index")
                  end
                ' "$INDEX_FILE"
                ;;
              404)
                printf ''
                ;;
              *)
                echo "unexpected sparse-index status: $status" >&2
                return 2
                ;;
            esac
          }

          REMOTE_SHA="$(remote_checksum)"
          if test -n "$REMOTE_SHA"; then
            test "$LOCAL_SHA" = "$REMOTE_SHA"
            echo "crates.io already contains the exact verified crate"
            exit 0
          fi
          test "$(gh release view "$GITHUB_REF_NAME" --json isDraft --jq .isDraft)" = true

          set +e
          cargo publish --manifest-path "$SOURCE_MANIFEST" --locked
          PUBLISH_STATUS=$?
          set -e
          test "$(shasum -a 256 "$CRATE" | awk '{print $1}')" = "$LOCAL_SHA"

          POLL_DEADLINE=$((SECONDS + 300))
          while (( SECONDS < POLL_DEADLINE )); do
            REMAINING=$((POLL_DEADLINE - SECONDS))
            PROBE_TIME="$REMAINING"
            if (( PROBE_TIME > 30 )); then
              PROBE_TIME=30
            fi
            if REMOTE_SHA="$(remote_checksum "$PROBE_TIME" 0)"; then
              if test -n "$REMOTE_SHA"; then
                test "$LOCAL_SHA" = "$REMOTE_SHA"
                echo "verified exact crate checksum in sparse index"
                exit 0
              fi
            else
              PROBE_STATUS=$?
              if test "$PROBE_STATUS" -ne 2; then
                exit "$PROBE_STATUS"
              fi
              echo "transient sparse-index probe failure; retrying before the deadline" >&2
            fi
            REMAINING=$((POLL_DEADLINE - SECONDS))
            if (( REMAINING > 5 )); then
              sleep 5
            elif (( REMAINING > 0 )); then
              sleep "$REMAINING"
            fi
          done

          if test "$PUBLISH_STATUS" -ne 0; then
            echo "cargo publish failed and the exact crate never appeared in the sparse index" >&2
            exit "$PUBLISH_STATUS"
          fi
          echo "cargo publish returned success but the exact crate did not appear in the sparse index" >&2
          exit 1
      - name: Verify exact published version installs
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          for attempt in {1..6}; do
            if cargo install previously-on --version "$VERSION" --locked --root "${RUNNER_TEMP}/published"; then
              "${RUNNER_TEMP}/published/bin/previously" --version | grep -F "previously $VERSION"
              exit 0
            fi
            sleep 10
          done
          echo "exact-version crates.io install did not become available" >&2
          exit 1
      - name: Reverify the exact draft immediately before publication
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          EXPECTED="${RUNNER_TEMP}/final-expected-assets.txt"
          cat > "$EXPECTED" <<EOF
          NOTICE
          SHA256SUMS
          THIRD_PARTY_LICENSES.md
          previously-on-v$VERSION-macos-arm64.tar.gz
          previously-on-v$VERSION-source.tar.gz
          previously-on-v$VERSION.cdx.json
          previously-v$VERSION-macos-arm64
          EOF
          LC_ALL=C sort -o "$EXPECTED" "$EXPECTED"
          test "$(gh release view "$GITHUB_REF_NAME" --json isDraft --jq .isDraft)" = true
          gh release view "$GITHUB_REF_NAME" --json assets --jq '.assets[].name' \
            | LC_ALL=C sort > "${RUNNER_TEMP}/final-remote-assets.txt"
          cmp "$EXPECTED" "${RUNNER_TEMP}/final-remote-assets.txt"

          mkdir -p "${RUNNER_TEMP}/final-release"
          gh release download "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --dir "${RUNNER_TEMP}/final-release"
          find "${RUNNER_TEMP}/final-release" -maxdepth 1 -type f -exec basename {} \; \
            | LC_ALL=C sort > "${RUNNER_TEMP}/final-downloaded-assets.txt"
          cmp "$EXPECTED" "${RUNNER_TEMP}/final-downloaded-assets.txt"

          cd "${RUNNER_TEMP}/final-release"
          shasum -a 256 -c SHA256SUMS
          CERT_IDENTITY="https://github.com/$GITHUB_REPOSITORY/.github/workflows/release.yml@refs/tags/$GITHUB_REF_NAME"
          while IFS= read -r asset; do
            gh attestation verify "$asset" \
              --repo "$GITHUB_REPOSITORY" \
              --cert-identity "$CERT_IDENTITY" \
              --deny-self-hosted-runners >/dev/null
          done < "$EXPECTED"
          gh attestation verify \
            "previously-on-v$VERSION-source.tar.gz" \
            --repo "$GITHUB_REPOSITORY" \
            --cert-identity "$CERT_IDENTITY" \
            --deny-self-hosted-runners \
            --format json > "${RUNNER_TEMP}/final-source-attestation.json"
          while IFS= read -r asset; do
            ASSET_SHA="$(shasum -a 256 "$asset" | awk '{print $1}')"
            jq -e \
              --arg asset "$asset" \
              --arg sha "$ASSET_SHA" \
              --arg commit "$GITHUB_SHA" \
              --arg ref "refs/tags/$GITHUB_REF_NAME" '
                any(.[].verificationResult;
                  .signature.certificate.sourceRepositoryDigest == $commit and
                  .signature.certificate.sourceRepositoryRef == $ref and
                  .signature.certificate.runnerEnvironment == "github-hosted" and
                  any(.statement.subject[];
                    .name == $asset and .digest.sha256 == $sha))
              ' "${RUNNER_TEMP}/final-source-attestation.json" >/dev/null
          done < "$EXPECTED"
          REMOTE_TAG_COMMIT="$(git -C "$GITHUB_WORKSPACE" ls-remote origin "refs/tags/$GITHUB_REF_NAME^{}" | awk '{print $1}')"
          test "$REMOTE_TAG_COMMIT" = "$GITHUB_SHA"
      - name: Publish the verified GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PRERELEASE=false
          case "$VERSION" in
            *-*) PRERELEASE=true ;;
          esac
          gh release edit "$GITHUB_REF_NAME" \
            --draft=false --prerelease="$PRERELEASE" --latest=false
          test "$(gh release view "$GITHUB_REF_NAME" --json isDraft --jq .isDraft)" = false
          test "$(gh release view "$GITHUB_REF_NAME" --json isPrerelease --jq .isPrerelease)" = "$PRERELEASE"
