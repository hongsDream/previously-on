name: Bug report
description: Report a reproducible PreviouslyOn defect without private data
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include credentials, private prompts, or repository contents. Report security issues privately through the Security tab.
  - type: input
    id: version
    attributes:
      label: PreviouslyOn version
      placeholder: 0.1.0-alpha.1
    validations:
      required: true
  - type: input
    id: codex
    attributes:
      label: Codex version and surface
      placeholder: Codex CLI 0.144.2 or Codex App build
    validations:
      required: true
  - type: dropdown
    id: architecture
    attributes:
      label: Mac architecture
      options: [Apple Silicon, Intel]
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Sanitized reproduction
      description: Include commands, observed output, and expected behavior with all secrets and private data removed.
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Sanitized doctor output
      render: shell
